version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: attendify_db
    environment:
      POSTGRES_USER: attendify
      POSTGRES_PASSWORD: attendify
      POSTGRES_DB: attendify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendify"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendify_backend
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://attendify:attendify@db:5432/attendify
      ML_SERVICE_URL: http://ml-service:8001
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
